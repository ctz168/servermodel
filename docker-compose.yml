# 统一分布式推理系统 - Docker Compose 配置
#
# 使用方法:
#   docker-compose up -d
#
# 查看日志:
#   docker-compose logs -f
#
# 停止服务:
#   docker-compose down
#

version: '3.8'

services:
  # 领导节点
  leader:
    build: .
    container_name: inference-leader
    ports:
      - "8080:8080"
      - "5000:5000"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - NODE_NAME=leader
    command: >
      python node_unified_complete.py
      --port 5000
      --api-port 8080
      --model Qwen/Qwen2.5-0.5B-Instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 工作节点 1
  worker1:
    build: .
    container_name: inference-worker-1
    ports:
      - "8081:8080"
      - "5001:5000"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - NODE_NAME=worker-1
    command: >
      python node_unified_complete.py
      --port 5000
      --api-port 8080
      --seeds leader:5000
      --model Qwen/Qwen2.5-0.5B-Instruct
    depends_on:
      leader:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 工作节点 2
  worker2:
    build: .
    container_name: inference-worker-2
    ports:
      - "8082:8080"
      - "5002:5000"
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - NODE_NAME=worker-2
    command: >
      python node_unified_complete.py
      --port 5000
      --api-port 8080
      --seeds leader:5000
      --model Qwen/Qwen2.5-0.5B-Instruct
    depends_on:
      leader:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  default:
    name: inference-network
